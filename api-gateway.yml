server:
  port: 9090

spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payment/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
